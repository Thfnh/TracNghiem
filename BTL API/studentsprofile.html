<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Trang học sinh</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="css/studentsprofile.css">
</head>

<body>

    <div class="container">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <h2 class="logo">EDUSO</h2>

            <ul>
                <li onclick="goHome()">🏠 Trang chủ</li>
                <li onclick="goExam()">📝 Vào thi</li>
                <li onclick="goProfile()">👤 Cá nhân</li>
                <li onclick="goGrade()">📊 Bảng điểm</li>
                <li onclick="goNews()">📰 Tin tức</li>
                <li onclick="goGuide()">❓ Hướng dẫn</li>
            </ul>
        </div>

        <div class="profile-container">
            <h2>Thông tin cá nhân</h2>

            <label>Username</label>
            <input type="text" id="username" disabled>

            <label>Họ tên</label>
            <input type="text" id="fullname">

            <label>Mã sinh viên</label>
            <input type="text" id="student_code">

            <label>Mật khẩu mới</label>
            <input type="password" id="password">

            <button onclick="updateProfile()">Cập nhật</button>
        </div>

        <script src="/js/studentsprofile.js"></script>
    </div>

</body>

</html>
