<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Trang học sinh</title>
    <link rel="stylesheet" href="/css/admin.css">

</head>

<body>

        <!-- SIDEBAR -->
        <div class="sidebar">

        </div>

    </div>

    <!-- SCRIPT MỚI -->
    <script src="/js/studentnews.js"></script>
